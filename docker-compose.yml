services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://admin:oracle1234cine%3F406cine@postgres-db-1:5432/postgres?schema=public
      - PORT=5000
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - db-network 

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

networks:
  db-network:
    external: true
    name: postgres_default
