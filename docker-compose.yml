services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "oracle1234cine?406cine"
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://admin:oracle1234cine%3F406cine@db:5432/postgres?schema=public
      - PORT=5000
    volumes:
      - ./backend:/app
      - /app/node_modules # Prevent overwriting container's node_modules with host's
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevent overwriting container's node_modules with host's
    depends_on:
      - backend

volumes:
  postgres_data:
