name: CI/CD Deployment to Ubuntu Server

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Define where the project should live on your server
            PROJECT_DIR="~/test2"
            
            # Check if the project folder exists. If not, clone the repo.
            if [ ! -d "$PROJECT_DIR" ]; then
              git clone https://github.com/sigutz/test2.git $PROJECT_DIR
            fi
            
            cd $PROJECT_DIR
            
            git pull origin main
            
            # Rebuild and restart the Docker containers

            docker compose down
            docker compose up -d --build
            
            # Clean up old unused docker images to save disk space
            docker image prune -f
